<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Freedom Blueprint | 25-Year SM Strategist</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- PropTypes - Required by Recharts UMD builds -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Recharts - Stable UMD -->
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.263.0"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .recharts-cartesian-grid-horizontal line { stroke: #f1f5f9; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const { 
            AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine, Label, Legend 
        } = window.Recharts;

        // Icon Component with Safety Checks
        const Icon = ({ name, size = 20, className = "" }) => {
            const [iconHtml, setIconHtml] = useState("");
            useEffect(() => {
                if (window.lucide) {
                    const icon = window.lucide.icons[name] || window.lucide.icons[name.charAt(0).toLowerCase() + name.slice(1)];
                    if (icon && typeof icon.toSvg === 'function') {
                        setIconHtml(icon.toSvg({ size, class: className }));
                    }
                }
            }, [name, size, className]);
            return <span dangerouslySetInnerHTML={{ __html: iconHtml }} className="inline-flex items-center" />;
        };

        const App = () => {
            // --- Presets ---
            const presets = [
                { id: 'fixed-a', name: '3.69% 3yr Fixed', rate: 3.69, heloc: 5.20, color: 'bg-blue-600' },
                { id: 'fixed-c', name: '3.75% 3yr Fixed', rate: 3.75, heloc: 5.20, color: 'bg-indigo-600' },
                { id: 'var-b', name: '3.50% Variable', rate: 3.50, heloc: 5.45, color: 'bg-orange-500' }
            ];

            // --- State: Planning Levers ---
            const [loanAmount, setLoanAmount] = useState(1286000); 
            const [initialLumpSum, setInitialLumpSum] = useState(135000); 
            const [amortization, setAmortization] = useState(25);
            const [interestRate, setInterestRate] = useState(3.69);
            const [taxRate, setTaxRate] = useState(53.5);
            const [investmentReturn, setInvestmentReturn] = useState(4.0); 
            const [helocRate, setHelocRate] = useState(5.20); 
            const [annualRRSPContribution, setAnnualRRSPContribution] = useState(5000);
            const [annualRefund, setAnnualRefund] = useState(15500);

            // Strategy Toggles
            const [useAccelerator, setUseAccelerator] = useState(false);
            const [useSMDeductionRefund, setUseSMDeductionRefund] = useState(true);

            const applyPreset = (p) => {
                setInterestRate(p.rate);
                setHelocRate(p.heloc);
            };

            // --- Calculation Engine ---
            const results = useMemo(() => {
                const effectiveStartBalance = Math.max(0, loanAmount - initialLumpSum);
                let currentBalance = effectiveStartBalance;
                let totalPortfolio = 0;
                let helocInterestAccumulatedForYear = 0;
                let totalConvertedPrincipal = 0;
                let data = [];
                let breakevenMonth = null;
                
                // Track Year 1 stats for the breakdown UI
                let year1ShieldAmt = 0;
                let year1PrincipalAmt = 0;

                const monthlyRate = interestRate / 100 / 12;
                const helocMonthlyRate = helocRate / 100 / 12;
                const totalMonths = Math.max(1, amortization * 12);
                
                const monthlyMortgagePayment = (effectiveStartBalance * monthlyRate) / (1 - Math.pow(1 + monthlyRate, -totalMonths));

                data.push({ year: 0, balance: Math.round(effectiveStartBalance), portfolio: 0 });

                for (let month = 1; month <= totalMonths; month++) {
                    const interestMth = currentBalance * monthlyRate;
                    const principalMth = Math.min(currentBalance, monthlyMortgagePayment - interestMth);
                    
                    currentBalance -= principalMth;
                    totalConvertedPrincipal += principalMth;
                    let addedToInvestments = principalMth; 
                    
                    if (month <= 12) year1PrincipalAmt += principalMth;

                    const helocInterestMth = totalPortfolio * helocMonthlyRate;
                    helocInterestAccumulatedForYear += helocInterestMth;

                    // Strategic Year-End Events
                    if (month % 12 === 0) {
                        // RRSP Contribution is outside the loan but inside the portfolio
                        addedToInvestments += annualRRSPContribution;
                        
                        // 1. The Accelerator Loop
                        if (useAccelerator) {
                            const accel = Math.min(currentBalance, annualRefund);
                            currentBalance -= accel;
                            addedToInvestments += accel;
                        }

                        // 2. The Deduction Shield Loop
                        const shieldRefund = helocInterestAccumulatedForYear * (taxRate / 100);
                        if (month === 12) year1ShieldAmt = shieldRefund;
                        
                        if (useSMDeductionRefund) {
                            const appliedShield = Math.min(currentBalance, shieldRefund);
                            currentBalance -= appliedShield;
                            addedToInvestments += appliedShield;
                        }
                        helocInterestAccumulatedForYear = 0;
                    }

                    // Investment Growth (Compounded Monthly)
                    totalPortfolio = (totalPortfolio + addedToInvestments) * (1 + (investmentReturn / 100 / 12));

                    // Detection logic for convergence
                    if (totalPortfolio >= currentBalance && breakevenMonth === null) {
                        breakevenMonth = month;
                    }

                    if (month % 12 === 0 || month === totalMonths) {
                        data.push({
                            year: Math.floor(month / 12),
                            balance: Math.max(0, Math.round(currentBalance)),
                            portfolio: Math.round(totalPortfolio),
                        });
                    }
                }

                return {
                    data,
                    breakevenYear: breakevenMonth ? (breakevenMonth / 12).toFixed(1) : "None",
                    monthlyMortgagePayment,
                    afterTaxBorrowingCost: helocRate * (1 - taxRate/100),
                    year1ShieldAmt,
                    year1PrincipalAmt
                };
            }, [loanAmount, initialLumpSum, amortization, interestRate, helocRate, annualRRSPContribution, annualRefund, useAccelerator, useSMDeductionRefund, investmentReturn, taxRate]);

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 text-slate-900">
                    <div className="max-w-7xl mx-auto space-y-6">
                        
                        {/* Header */}
                        <header className="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-slate-200 pb-6">
                            <div>
                                <h1 className="text-3xl font-bold text-slate-900 tracking-tight flex items-center gap-3">
                                    <Icon name="ShieldCheck" size={32} className="text-blue-600" />
                                    Mortgage Freedom Blueprint
                                </h1>
                                <p className="text-slate-500 mt-1 italic font-medium">Debt Conversion & Strategic Wealth Engine</p>
                            </div>
                            <div className="flex gap-4">
                                <div className="flex items-center gap-3 bg-white px-4 py-2 rounded-xl border border-slate-200 shadow-sm">
                                    <Icon name="Flag" className="text-blue-600" />
                                    <div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase">Freedom Point</p>
                                        <p className="text-lg font-bold text-slate-900 leading-tight">Year {results.breakevenYear}</p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-3 bg-blue-600 px-4 py-2 rounded-xl text-white shadow-lg">
                                    <Icon name="Zap" />
                                    <div>
                                        <p className="text-[10px] font-bold opacity-80 uppercase tracking-wider">Arbitrage Margin</p>
                                        <p className="text-lg font-bold leading-tight">{(investmentReturn - results.afterTaxBorrowingCost).toFixed(2)}%</p>
                                    </div>
                                </div>
                            </div>
                        </header>

                        {/* Presets */}
                        <section className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                            <div className="flex items-center gap-2 mb-4 text-slate-800 font-bold text-sm uppercase tracking-widest border-b border-slate-50 pb-2">
                                <Icon name="Library" className="text-blue-500" />
                                Strategic Presets
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                {presets.map((p) => (
                                    <button key={p.id} onClick={() => applyPreset(p)} 
                                        className={`p-4 rounded-xl border-2 transition-all flex items-center gap-4 ${interestRate === p.rate ? 'border-blue-500 bg-blue-50' : 'border-slate-100 hover:border-slate-200 bg-slate-50/50'}`}>
                                        <div className={`w-10 h-10 rounded-lg ${p.color} flex items-center justify-center text-white font-bold`}>%</div>
                                        <div className="text-left">
                                            <p className="text-sm font-bold text-slate-900">{p.name}</p>
                                            <p className="text-[10px] text-slate-500 uppercase">Apply Parameters</p>
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </section>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            
                            {/* Controls Sidebar */}
                            <aside className="lg:col-span-4 space-y-6">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-6 overflow-hidden">
                                    <div className="flex items-center gap-2 text-slate-800 font-bold border-b border-slate-100 pb-3 mb-2">
                                        <Icon name="Settings2" className="text-slate-400" />
                                        Levers & Inputs
                                    </div>

                                    {/* Subsection: Mortgage Profile */}
                                    <div className="space-y-4">
                                        <div>
                                            <h3 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Mortgage Profile</h3>
                                            <p className="text-[9px] text-slate-500">Structure of the primary debt liability.</p>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="col-span-2">
                                                <label className="block text-[11px] font-medium text-slate-500 mb-1 ml-1">Total Principal ($)</label>
                                                <input type="number" value={loanAmount} onChange={(e) => setLoanAmount(Number(e.target.value))} className="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none" />
                                            </div>
                                            <div>
                                                <label className="block text-[11px] font-medium text-slate-500 mb-1 ml-1">Rate (%)</label>
                                                <input type="number" step="0.01" value={interestRate} onChange={(e) => setInterestRate(Number(e.target.value))} className="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm" />
                                            </div>
                                            <div>
                                                <label className="block text-[11px] font-medium text-slate-500 mb-1 ml-1">Amort (Yrs)</label>
                                                <input type="number" value={amortization} onChange={(e) => setAmortization(Number(e.target.value))} className="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm" />
                                            </div>
                                        </div>
                                    </div>

                                    {/* Subsection: Initial Actions */}
                                    <div className="space-y-4 pt-4 border-t border-slate-100">
                                        <div>
                                            <h3 className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest">Initial Injection</h3>
                                            <p className="text-[9px] text-slate-500">One-time lump sum applied on Day 1.</p>
                                        </div>
                                        <input type="number" value={initialLumpSum} onChange={(e) => setInitialLumpSum(Number(e.target.value))} className="w-full p-2 bg-emerald-50 border border-emerald-100 rounded-lg text-sm font-bold text-emerald-700" />
                                    </div>

                                    {/* Subsection: Tax & Credit Engine */}
                                    <div className="space-y-4 pt-4 border-t border-slate-100">
                                        <div>
                                            <h3 className="text-[10px] font-bold text-indigo-600 uppercase tracking-widest">Tax & Credit Engine</h3>
                                            <p className="text-[9px] text-slate-500">HELOC and marginal tax parameters.</p>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div>
                                                <label className="block text-[11px] font-medium text-slate-500 mb-1 ml-1">HELOC Rate (%)</label>
                                                <input type="number" step="0.01" value={helocRate} onChange={(e) => setHelocRate(Number(e.target.value))} className="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm" />
                                            </div>
                                            <div>
                                                <label className="block text-[11px] font-medium text-slate-500 mb-1 ml-1">Tax Rate (%)</label>
                                                <input type="number" step="0.1" value={taxRate} onChange={(e) => setTaxRate(Number(e.target.value))} className="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm" />
                                            </div>
                                        </div>
                                    </div>

                                    {/* Subsection: Wealth Engine */}
                                    <div className="space-y-4 pt-4 border-t border-slate-100">
                                        <div>
                                            <h3 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Wealth Engine</h3>
                                            <p className="text-[9px] text-slate-500">Expected returns and direct RRSP injections.</p>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div>
                                                <label className="block text-[11px] font-medium text-slate-500 mb-1 ml-1">ETF Return (%)</label>
                                                <input type="number" step="0.1" value={investmentReturn} onChange={(e) => setInvestmentReturn(Number(e.target.value))} className="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm" />
                                            </div>
                                            <div>
                                                <label className="block text-[11px] font-medium text-slate-500 mb-1 ml-1">Annual RRSP ($)</label>
                                                <input type="number" value={annualRRSPContribution} onChange={(e) => setAnnualRRSPContribution(Number(e.target.value))} className="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm" />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </aside>

                            {/* Main Visualization & Live Strategy panel */}
                            <main className="lg:col-span-8 space-y-6">
                                
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm border-t-4 border-t-blue-500">
                                        <p className="text-slate-500 text-[10px] font-bold uppercase tracking-widest flex items-center gap-1.5 mb-1.5">
                                            <Icon name="Wallet" size={12} className="text-blue-500" />
                                            Monthly Outlay
                                        </p>
                                        <h3 className="text-2xl font-bold text-slate-900">${Math.round(results.monthlyMortgagePayment).toLocaleString()}</h3>
                                        <p className="text-[10px] text-slate-400 italic font-medium">Standard P&I Payment</p>
                                    </div>
                                    <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm border-t-4 border-t-emerald-500">
                                        <p className="text-emerald-600 text-[10px] font-bold uppercase tracking-widest flex items-center gap-1.5 mb-1.5">
                                            <Icon name="Zap" size={12} />
                                            Real Interest
                                        </p>
                                        <h3 className="text-2xl font-bold text-slate-900">{results.afterTaxBorrowingCost.toFixed(2)}%</h3>
                                        <p className="text-[10px] text-slate-400 italic font-medium">Effective Net Hurdle</p>
                                    </div>
                                    <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm border-t-4 border-t-indigo-500 transition-colors">
                                        <p className="text-indigo-600 text-[10px] font-bold uppercase tracking-widest flex items-center gap-1.5 mb-1.5">
                                            <Icon name="Flag" size={12} />
                                            Freedom Date
                                        </p>
                                        <h3 className="text-2xl font-bold text-slate-900">Yr {results.breakevenYear}</h3>
                                        <p className="text-[10px] text-slate-400 italic font-medium tracking-tight">Net Asset Convergence</p>
                                    </div>
                                </div>

                                {/* Main Plot */}
                                <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                                    <div className="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
                                        <div>
                                            <h2 className="text-xl font-bold text-slate-800 tracking-tight flex items-center gap-2">
                                                The {amortization}-Year Convergence Roadmap
                                            </h2>
                                            <p className="text-xs text-slate-500 font-medium italic tracking-tight mt-1">Modeling debt-to-asset conversion through readvanceable credit.</p>
                                        </div>
                                        <div className="hidden sm:flex gap-4 text-[10px] font-bold uppercase tracking-widest text-slate-400 bg-slate-50 px-4 py-2 rounded-full border border-slate-100">
                                            <span className="flex items-center gap-2"><div className="w-2.5 h-2.5 bg-red-400 rounded-full" /> Debt</span>
                                            <span className="flex items-center gap-2"><div className="w-2.5 h-2.5 bg-emerald-400 rounded-full" /> Assets</span>
                                        </div>
                                    </div>
                                    <div className="h-[450px] w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <AreaChart data={results.data} margin={{ top: 20, right: 30, left: 10, bottom: 0 }}>
                                                <defs>
                                                    <linearGradient id="colorBalance" x1="0" y1="0" x2="0" y2="1">
                                                        <stop offset="5%" stopColor="#ef4444" stopOpacity={0.15}/>
                                                        <stop offset="95%" stopColor="#ef4444" stopOpacity={0}/>
                                                    </linearGradient>
                                                    <linearGradient id="colorInvest" x1="0" y1="0" x2="0" y2="1">
                                                        <stop offset="5%" stopColor="#10b981" stopOpacity={0.15}/>
                                                        <stop offset="95%" stopColor="#10b981" stopOpacity={0}/>
                                                    </linearGradient>
                                                </defs>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                <XAxis dataKey="year" stroke="#94a3b8" fontSize={11} tickLine={false} axisLine={false} />
                                                <YAxis stroke="#94a3b8" fontSize={10} tickLine={false} axisLine={false} tickFormatter={(v) => `$${(v/1000000).toFixed(1)}M`} />
                                                <Tooltip 
                                                    contentStyle={{ borderRadius: '16px', border: 'none', boxShadow: '0 20px 25px -5px rgb(0 0 0 / 0.1)' }} 
                                                    formatter={(v) => [`$${v.toLocaleString()}`, '']} 
                                                    labelFormatter={(label) => `Year ${label}`} 
                                                />
                                                {results.breakevenYear !== "25+" && results.breakevenYear !== "None" && (
                                                    <ReferenceLine x={parseFloat(results.breakevenYear)} stroke="#3b82f6" strokeDasharray="3 3" strokeWidth={2}>
                                                        <Label value={`BREAKEVEN YR ${results.breakevenYear}`} position="top" fill="#3b82f6" fontSize={10} fontWeight="bold" />
                                                    </ReferenceLine>
                                                )}
                                                <Area type="monotone" dataKey="balance" name="Remaining Debt" stroke="#ef4444" fill="url(#colorBalance)" strokeWidth={4} />
                                                <Area type="monotone" dataKey="portfolio" name="Liquid Assets" stroke="#10b981" fill="url(#colorInvest)" strokeWidth={4} />
                                            </AreaChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                {/* STRATEGIC BREAKDOWN SECTION */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    
                                    {/* Deduction Shield Breakdown */}
                                    <div className={`p-6 rounded-3xl border transition-all ${useSMDeductionRefund ? 'bg-blue-50 border-blue-200' : 'bg-white border-slate-200'}`}>
                                        <div className="flex items-center justify-between mb-4">
                                            <div className="flex items-center gap-2">
                                                <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${useSMDeductionRefund ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-400'}`}>
                                                    <Icon name="Zap" size={16} />
                                                </div>
                                                <h3 className="font-bold text-slate-800 uppercase text-xs tracking-widest">Deduction Shield</h3>
                                            </div>
                                            <button onClick={() => setUseSMDeductionRefund(!useSMDeductionRefund)} className={`h-6 w-12 rounded-full transition-colors ${useSMDeductionRefund ? 'bg-blue-600' : 'bg-slate-300'} relative`}>
                                                <div className={`h-4 w-4 bg-white rounded-full absolute top-1 transition-all ${useSMDeductionRefund ? 'right-1' : 'left-1'}`} />
                                            </button>
                                        </div>
                                        <p className="text-xs text-slate-600 leading-relaxed mb-4">
                                            This loop converts your <strong>{taxRate}% tax bracket</strong> into a mortgage-paydown engine. Interest paid on your investment loan (HELOC) is tax-deductible, creating a guaranteed annual refund from the CRA.
                                        </p>
                                        {useSMDeductionRefund ? (
                                            <div className="bg-white/80 p-4 rounded-2xl border border-blue-100 space-y-2">
                                                <div className="flex justify-between text-[10px] font-bold text-blue-800 uppercase">
                                                    <span>Year 1 Projected Refund</span>
                                                    <span>${Math.round(results.year1ShieldAmt).toLocaleString()}</span>
                                                </div>
                                                <p className="text-[10px] text-slate-500 italic leading-tight">
                                                    "This amount will be applied as a lump-sum to your mortgage, then immediately re-borrowed to buy more ETFs, accelerating the conversion of dead equity into growth assets."
                                                </p>
                                            </div>
                                        ) : (
                                            <p className="text-[10px] text-slate-400 italic">Toggle ON to model the reinvestment of interest-driven tax savings.</p>
                                        )}
                                    </div>

                                    {/* RRSP Accelerator Breakdown */}
                                    <div className={`p-6 rounded-3xl border transition-all ${useAccelerator ? 'bg-emerald-50 border-emerald-200' : 'bg-white border-slate-200'}`}>
                                        <div className="flex items-center justify-between mb-4">
                                            <div className="flex items-center gap-2">
                                                <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${useAccelerator ? 'bg-emerald-600 text-white' : 'bg-slate-100 text-slate-400'}`}>
                                                    <Icon name="RefreshCw" size={16} />
                                                </div>
                                                <h3 className="font-bold text-slate-800 uppercase text-xs tracking-widest">RRSP Accelerator</h3>
                                            </div>
                                            <button onClick={() => setUseAccelerator(!useAccelerator)} className={`h-6 w-12 rounded-full transition-colors ${useAccelerator ? 'bg-emerald-600' : 'bg-slate-300'} relative`}>
                                                <div className={`h-4 w-4 bg-white rounded-full absolute top-1 transition-all ${useAccelerator ? 'right-1' : 'left-1'}`} />
                                            </button>
                                        </div>
                                        <p className="text-xs text-slate-600 leading-relaxed mb-4">
                                            This loop uses tax refunds from your primary income (RRSP contributions) to "smash" the mortgage principal. This is variable and depends on your specific annual contribution room.
                                        </p>
                                        {useAccelerator ? (
                                            <div className="space-y-3">
                                                <div className="bg-white/80 p-4 rounded-2xl border border-emerald-100">
                                                    <div className="flex justify-between text-[10px] font-bold text-emerald-800 uppercase mb-1">
                                                        <span>Target Annual Refund</span>
                                                        <span>${Math.round(annualRefund).toLocaleString()}</span>
                                                    </div>
                                                    <p className="text-[10px] text-slate-500 leading-tight">
                                                        By applying this <strong>${Math.round(annualRefund).toLocaleString()}</strong> annual injection, you are replacing "bad debt" with "good debt" at a faster rate than organic paydown.
                                                    </p>
                                                </div>
                                                <input type="number" value={annualRefund} onChange={(e) => setAnnualRefund(Number(e.target.value))} className="w-full p-2 bg-white border border-emerald-100 rounded-lg text-xs font-bold text-emerald-700 outline-none" placeholder="Enter Refund Amount..." />
                                            </div>
                                        ) : (
                                            <p className="text-[10px] text-slate-400 italic">Toggle ON if you plan to inject your annual tax refunds as lump-sum mortgage payments.</p>
                                        )}
                                    </div>
                                </div>

                                {/* Conversion Engine Statistics */}
                                <div className="bg-slate-900 text-white p-8 rounded-[2rem] shadow-xl border border-slate-800">
                                    <h3 className="text-sm font-bold uppercase tracking-widest text-blue-400 mb-6 flex items-center gap-2">
                                        <Icon name="TrendingUp" size={16} />
                                        Conversion Engine: Year 1 Breakdown
                                    </h3>
                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-8">
                                        <div className="space-y-1">
                                            <p className="text-[10px] text-slate-400 uppercase font-bold tracking-tighter">Organic principal conversion</p>
                                            <p className="text-xl font-bold font-mono text-white">${Math.round(results.year1PrincipalAmt).toLocaleString()}</p>
                                            <p className="text-[9px] text-slate-500 leading-tight">Paid via regular mortgage payments.</p>
                                        </div>
                                        <div className="space-y-1">
                                            <p className="text-[10px] text-slate-400 uppercase font-bold tracking-tighter">Direct RRSP Contribution</p>
                                            <p className="text-xl font-bold font-mono text-white">${Math.round(annualRRSPContribution).toLocaleString()}</p>
                                            <p className="text-[9px] text-slate-500 leading-tight">New cash added to the portfolio.</p>
                                        </div>
                                        <div className="space-y-1">
                                            <p className="text-[10px] text-slate-400 uppercase font-bold tracking-tighter">Total Conversion Year 1</p>
                                            <p className="text-xl font-bold font-mono text-emerald-400">${Math.round(results.year1PrincipalAmt + annualRRSPContribution + (useAccelerator ? annualRefund : 0) + (useSMDeductionRefund ? results.year1ShieldAmt : 0)).toLocaleString()}</p>
                                            <p className="text-[9px] text-slate-500 leading-tight">Includes all active strategic loops.</p>
                                        </div>
                                    </div>
                                </div>

                                <footer className="bg-white border border-slate-200 p-8 rounded-3xl text-slate-500 text-[10px] flex items-start gap-6 uppercase tracking-widest font-bold">
                                    <Icon name="Info" size={24} className="text-blue-500 shrink-0" />
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-12 w-full leading-relaxed">
                                        <div className="space-y-3">
                                            <p className="text-slate-800 text-xs tracking-tight">The Freedom Point</p>
                                            <p>The "Year Zero" milestone is the theoretical point where your liquid investment portfolio is large enough to pay off the remaining mortgage principal in full.</p>
                                        </div>
                                        <div className="space-y-3">
                                            <p className="text-slate-800 text-xs tracking-tight">Strategy Efficiency</p>
                                            <p>As a {taxRate}% bracket earner, the government effectively pays for half of your borrowing cost, dramatically lowering the "Growth Hurdle" required to reach freedom.</p>
                                        </div>
                                    </div>
                                </footer>

                            </main>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
