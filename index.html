<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Renewal 2026 | BC High-Earner Strategist</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- PropTypes - Required by many Recharts builds -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Recharts - Version 2.10.3 (Stable UMD) -->
    <script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
    <!-- Lucide Icons - Using a version that definitely supports toSvg -->
    <script src="https://unpkg.com/lucide@0.263.0"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .recharts-cartesian-grid-horizontal line { stroke: #f1f5f9; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        // Destructure from window.Recharts safely
        const { 
            AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine, Label, Legend 
        } = window.Recharts;

        // Corrected Icon Component for Lucide UMD
        const Icon = ({ name, size = 20, className = "" }) => {
            const [iconHtml, setIconHtml] = useState("");
            useEffect(() => {
                const renderIcon = () => {
                    // Lucide UMD uses camelCase or kebab-case. 
                    // We check if it's a function or object with toSvg
                    if (window.lucide) {
                        const icon = window.lucide.icons[name] || window.lucide.icons[name.charAt(0).toLowerCase() + name.slice(1)];
                        if (icon && typeof icon.toSvg === 'function') {
                            const svg = icon.toSvg({ size, class: className });
                            setIconHtml(svg);
                        }
                    }
                };
                renderIcon();
            }, [name, size, className]);
            return <span dangerouslySetInnerHTML={{ __html: iconHtml }} className="inline-flex items-center" />;
        };

        const App = () => {
            // --- State: Specialized 2026 Baseline ---
            const [loanAmount, setLoanAmount] = useState(1286000); 
            const [initialLumpSum, setInitialLumpSum] = useState(135000); 
            const [interestRate, setInterestRate] = useState(3.69);
            const [isVariable, setIsVariable] = useState(false);
            const [varSpread, setVarSpread] = useState(0.25); // Predicted annual hike
            const [taxRate, setTaxRate] = useState(53.5);
            const [investmentReturn, setInvestmentReturn] = useState(4.0); 
            const [helocRate, setHelocRate] = useState(5.20); 
            const [annualRRSPContribution, setAnnualRRSPContribution] = useState(5000);
            const [annualRefund, setAnnualRefund] = useState(15500);

            // Strategy Toggles
            const [useAccelerator, setUseAccelerator] = useState(false);
            const [useSMDeductionRefund, setUseSMDeductionRefund] = useState(true);

            const termYears = 3;

            // --- Calculation Engine ---
            const results = useMemo(() => {
                const effectiveStartBalance = Math.max(0, loanAmount - initialLumpSum);
                let currentBalance = effectiveStartBalance;
                let totalPortfolio = 0;
                let totalHelocInterestPaid = 0;
                let helocInterestAccumulatedForYear = 0;
                let data = [];

                const helocMonthlyRate = helocRate / 100 / 12;
                const amortizationMonths = 25 * 12;
                const baseMonthlyRate = interestRate / 100 / 12;
                const monthlyMortgagePayment = (effectiveStartBalance * baseMonthlyRate) / (1 - Math.pow(1 + baseMonthlyRate, -amortizationMonths));

                // Initial point
                data.push({ month: 0, balance: Math.round(effectiveStartBalance), portfolio: 0 });

                for (let month = 1; month <= termYears * 12; month++) {
                    // Variable Rate Simulation logic
                    let activeRate = interestRate;
                    if (isVariable && month > 12) {
                        activeRate += (Math.floor((month - 1) / 12) * varSpread);
                    }
                    const currentMonthlyRate = activeRate / 100 / 12;
                    const interestMth = currentBalance * currentMonthlyRate;
                    const principalMth = Math.min(currentBalance, monthlyMortgagePayment - interestMth);
                    
                    currentBalance -= principalMth;
                    let addedToInvestments = principalMth; 
                    
                    const helocInterestMth = totalPortfolio * helocMonthlyRate;
                    totalHelocInterestPaid += helocInterestMth;
                    helocInterestAccumulatedForYear += helocInterestMth;

                    // Annual Events
                    if (month % 12 === 0) {
                        addedToInvestments += annualRRSPContribution;
                        if (useAccelerator) {
                            currentBalance -= annualRefund;
                            addedToInvestments += annualRefund;
                        }
                        if (useSMDeductionRefund) {
                            const taxSavings = helocInterestAccumulatedForYear * (taxRate / 100);
                            currentBalance -= taxSavings;
                            addedToInvestments += taxSavings;
                        }
                        helocInterestAccumulatedForYear = 0;
                    }

                    totalPortfolio = (totalPortfolio + addedToInvestments) * (1 + (investmentReturn / 100 / 12));

                    if (month % 3 === 0) {
                        data.push({
                            month: month,
                            balance: Math.max(0, Math.round(currentBalance)),
                            portfolio: Math.round(totalPortfolio),
                        });
                    }
                }

                return {
                    data,
                    endingBalance: currentBalance,
                    endingPortfolio: totalPortfolio,
                    monthlyMortgagePayment,
                    afterTaxBorrowingCost: helocRate * (1 - taxRate/100),
                    finalHelocInterestMth: totalPortfolio * helocMonthlyRate
                };
            }, [loanAmount, initialLumpSum, interestRate, isVariable, varSpread, helocRate, annualRRSPContribution, annualRefund, useAccelerator, useSMDeductionRefund, investmentReturn, taxRate]);

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 text-slate-900">
                    <div className="max-w-7xl mx-auto space-y-6">
                        
                        {/* Header */}
                        <header className="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-slate-200 pb-6">
                            <div>
                                <h1 className="text-3xl font-bold text-slate-900 tracking-tight flex items-center gap-3">
                                    <Icon name="ShieldCheck" size={32} className="text-blue-600" />
                                    Mortgage Strategist 2026
                                </h1>
                                <p className="text-slate-500 mt-1 italic">Specialized Planning for British Columbia High-Earners (53.5%)</p>
                            </div>
                            <div className="flex gap-3">
                                <div className="bg-white px-4 py-2 rounded-xl border border-slate-200 shadow-sm text-center">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase">Effective Rate</p>
                                    <p className="text-lg font-bold text-blue-600 leading-tight">{results.afterTaxBorrowingCost.toFixed(2)}%</p>
                                </div>
                                <div className="bg-blue-600 px-4 py-2 rounded-xl text-white shadow-lg text-center">
                                    <p className="text-[10px] font-bold opacity-80 uppercase">Arbitrage</p>
                                    <p className="text-lg font-bold leading-tight">+{(investmentReturn - results.afterTaxBorrowingCost).toFixed(2)}%</p>
                                </div>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            
                            {/* Controls */}
                            <aside className="lg:col-span-4 space-y-6">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-6">
                                    <div className="flex items-center gap-2 text-slate-800 font-bold border-b pb-3">
                                        <Icon name="Settings2" className="text-blue-500" />
                                        Renewal Parameters
                                    </div>

                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-[11px] font-bold text-slate-500 uppercase mb-1">Renewal Balance ($)</label>
                                            <input type="number" value={loanAmount} onChange={(e) => setLoanAmount(Number(e.target.value))} className="w-full p-2 bg-slate-50 border rounded-lg text-sm font-bold focus:ring-2 focus:ring-blue-500 outline-none" />
                                        </div>
                                        <div className="bg-blue-50 p-3 rounded-xl border border-blue-100">
                                            <label className="block text-[11px] font-bold text-blue-700 uppercase mb-1 underline">Initial Lump Sum ($)</label>
                                            <input type="number" value={initialLumpSum} onChange={(e) => setInitialLumpSum(Number(e.target.value))} className="w-full p-2 bg-white border border-blue-200 rounded-lg text-sm font-bold focus:ring-2 focus:ring-blue-500 outline-none" />
                                        </div>
                                        
                                        <div className="grid grid-cols-2 gap-4 pt-2">
                                            <div>
                                                <label className="block text-[11px] font-bold text-slate-500 uppercase mb-1">Term Rate (%)</label>
                                                <input type="number" step="0.01" value={interestRate} onChange={(e) => setInterestRate(Number(e.target.value))} className="w-full p-2 border rounded-lg text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none" />
                                            </div>
                                            <div>
                                                <label className="block text-[11px] font-bold text-slate-500 uppercase mb-1">Product Type</label>
                                                <button onClick={() => setIsVariable(!isVariable)} className={`w-full p-2 rounded-lg text-xs font-bold uppercase transition-colors ${isVariable ? 'bg-orange-100 text-orange-700 border-orange-200' : 'bg-blue-100 text-blue-700 border-blue-200'} border`}>
                                                    {isVariable ? 'Variable' : 'Fixed'}
                                                </button>
                                            </div>
                                        </div>

                                        {isVariable && (
                                            <div className="p-3 bg-orange-50 border border-orange-200 rounded-xl space-y-2">
                                                <label className="block text-[10px] font-bold text-orange-700 uppercase">BoC Hike Forecast (%/yr)</label>
                                                <input type="range" min="0" max="1" step="0.1" value={varSpread} onChange={(e) => setVarSpread(Number(e.target.value))} className="w-full accent-orange-600" />
                                                <div className="flex justify-between text-[9px] font-bold text-orange-600 uppercase"><span>Stable</span><span>+{varSpread}% Hike</span></div>
                                            </div>
                                        )}
                                    </div>

                                    <div className="pt-4 border-t space-y-4">
                                        <div className="flex items-center gap-2 text-slate-800 font-bold">
                                            <Icon name="Zap" className="text-emerald-500" />
                                            Conversion Loops
                                        </div>

                                        <div className={`p-4 rounded-2xl border transition-all flex items-center justify-between ${useSMDeductionRefund ? 'bg-blue-50 border-blue-200 shadow-inner' : 'bg-slate-50 border-slate-100'}`}>
                                            <div className="max-w-[70%]">
                                                <p className="text-[11px] font-bold text-slate-700 uppercase tracking-tight">Deduction Shield</p>
                                                <p className="text-[9px] text-slate-500 leading-tight">Reinvest interest tax savings.</p>
                                            </div>
                                            <button onClick={() => setUseSMDeductionRefund(!useSMDeductionRefund)} className={`h-5 w-10 rounded-full transition-colors ${useSMDeductionRefund ? 'bg-blue-600' : 'bg-slate-300'} relative`}>
                                                <div className={`h-3 w-3 bg-white rounded-full absolute top-1 transition-all ${useSMDeductionRefund ? 'right-1' : 'left-1'}`} />
                                            </button>
                                        </div>

                                        <div className={`p-4 rounded-2xl border transition-all flex items-center justify-between ${useAccelerator ? 'bg-emerald-50 border-emerald-200 shadow-inner' : 'bg-slate-50 border-slate-100'}`}>
                                            <div className="max-w-[70%]">
                                                <p className="text-[11px] font-bold text-slate-700 uppercase tracking-tight">RRSP Accelerator</p>
                                                <p className="text-[9px] text-slate-500 leading-tight">Apply RRSP refunds to principal.</p>
                                            </div>
                                            <button onClick={() => setUseAccelerator(!useAccelerator)} className={`h-5 w-10 rounded-full transition-colors ${useAccelerator ? 'bg-emerald-600' : 'bg-slate-300'} relative`}>
                                                <div className={`h-3 w-3 bg-white rounded-full absolute top-1 transition-all ${useAccelerator ? 'right-1' : 'left-1'}`} />
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-amber-50 border border-amber-200 p-4 rounded-2xl">
                                    <div className="flex items-center gap-2 text-amber-800 font-bold text-[10px] uppercase tracking-wider mb-2">
                                        <Icon name="AlertTriangle" size={16} />
                                        Compliance Audit
                                    </div>
                                    <ul className="text-[10px] text-amber-700 space-y-1 font-medium leading-tight">
                                        <li>• High Earner (53.5%) MUST own investment account.</li>
                                        <li>• Pay HELOC interest from salary, not re-borrowing.</li>
                                        <li>• Property value must support 80% LTV floor.</li>
                                    </ul>
                                </div>
                            </aside>

                            {/* Dashboard */}
                            <main className="lg:col-span-8 space-y-6">
                                
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div className="bg-white p-5 rounded-2xl border shadow-sm border-t-4 border-t-blue-500">
                                        <p className="text-slate-500 text-[10px] font-bold uppercase tracking-widest flex items-center gap-1 mb-1">
                                            <Icon name="Wallet" size={12} className="text-blue-500" />
                                            Monthly Commit
                                        </p>
                                        <h3 className="text-2xl font-bold text-slate-900">
                                            ${Math.round(results.monthlyMortgagePayment + results.finalHelocInterestMth).toLocaleString()}
                                        </h3>
                                        <p className="text-[9px] text-slate-400 font-medium">Mtg + Max HELOC Interest</p>
                                    </div>
                                    <div className="bg-white p-5 rounded-2xl border shadow-sm border-t-4 border-t-emerald-500">
                                        <p className="text-emerald-600 text-[10px] font-bold uppercase tracking-widest flex items-center gap-1 mb-1">
                                            <Icon name="TrendingUp" size={12} />
                                            3yr Portfolio
                                        </p>
                                        <h3 className="text-2xl font-bold text-slate-900">${Math.round(results.endingPortfolio).toLocaleString()}</h3>
                                        <p className="text-[9px] text-emerald-500 font-medium">Invested Equity Assets</p>
                                    </div>
                                    <div className="bg-white p-5 rounded-2xl border shadow-sm border-t-4 border-t-red-500">
                                        <p className="text-red-600 text-[10px] font-bold uppercase tracking-widest flex items-center gap-1 mb-1">
                                            <Icon name="TrendingDown" size={12} />
                                            Remaining Debt
                                        </p>
                                        <h3 className="text-2xl font-bold text-slate-900">${Math.round(results.endingBalance).toLocaleString()}</h3>
                                        <p className="text-[9px] text-red-500 font-medium">Term-End Principal</p>
                                    </div>
                                </div>

                                <div className="bg-white p-8 rounded-3xl border shadow-sm">
                                    <div className="flex items-center justify-between mb-8">
                                        <div>
                                            <h2 className="text-xl font-bold text-slate-800 tracking-tight">Term Debt Conversion Curve</h2>
                                            <p className="text-xs text-slate-500 font-medium italic">Remaining Mortgage vs. Portfolio Growth (June 2026 - 2029)</p>
                                        </div>
                                        <div className="hidden sm:flex gap-4 text-[10px] font-bold uppercase tracking-widest text-slate-400">
                                            <span className="flex items-center gap-1"><div className="w-2 h-2 bg-red-400 rounded-full" /> Debt</span>
                                            <span className="flex items-center gap-1"><div className="w-2 h-2 bg-emerald-400 rounded-full" /> Assets</span>
                                        </div>
                                    </div>
                                    <div className="h-[400px] w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <AreaChart data={results.data} margin={{ top: 10, right: 30, left: 10, bottom: 0 }}>
                                                <defs>
                                                    <linearGradient id="colorBalance" x1="0" y1="0" x2="0" y2="1">
                                                        <stop offset="5%" stopColor="#ef4444" stopOpacity={0.15}/>
                                                        <stop offset="95%" stopColor="#ef4444" stopOpacity={0}/>
                                                    </linearGradient>
                                                    <linearGradient id="colorInvest" x1="0" y1="0" x2="0" y2="1">
                                                        <stop offset="5%" stopColor="#10b981" stopOpacity={0.15}/>
                                                        <stop offset="95%" stopColor="#10b981" stopOpacity={0}/>
                                                    </linearGradient>
                                                </defs>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                <XAxis dataKey="month" stroke="#94a3b8" fontSize={11} tickLine={false} axisLine={false} label={{ value: 'Months', position: 'insideBottomRight', offset: -10, fontSize: 10 }} />
                                                <YAxis stroke="#94a3b8" fontSize={10} tickLine={false} axisLine={false} tickFormatter={(v) => `$${(v/1000)}k`} />
                                                <Tooltip 
                                                    contentStyle={{ borderRadius: '16px', border: 'none', boxShadow: '0 20px 25px -5px rgb(0 0 0 / 0.1)' }} 
                                                    formatter={(v) => [`$${v.toLocaleString()}`, '']} 
                                                    labelFormatter={(label) => `Month ${label}`} 
                                                />
                                                <Area type="monotone" dataKey="balance" name="Remaining Debt" stroke="#ef4444" fill="url(#colorBalance)" strokeWidth={3} />
                                                <Area type="monotone" dataKey="portfolio" name="Assets Created" stroke="#10b981" fill="url(#colorInvest)" strokeWidth={3} />
                                            </AreaChart>
                                        </ResponsiveContainer>
                                    </div>
                                    <div className="mt-6 p-4 bg-slate-50 rounded-2xl flex items-center gap-3 border border-slate-100">
                                        <Icon name="TrendingUp" className="text-blue-500" />
                                        <p className="text-xs text-slate-600 font-medium leading-relaxed">
                                            By June 2029, you will have successfully converted <span className="font-bold text-slate-900">${Math.round(results.endingPortfolio).toLocaleString()}</span> of "dead equity" into liquid, tax-deductible investment capital.
                                        </p>
                                    </div>
                                </div>

                                <footer className="bg-slate-900 border border-slate-800 p-6 rounded-3xl text-slate-400 text-[10px] flex items-start gap-4 uppercase tracking-widest font-bold">
                                    <Icon name="Info" size={24} className="text-blue-400 shrink-0" />
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 w-full leading-relaxed">
                                        <div>
                                            <p className="text-white mb-1 text-xs">Interest Arbitrage Strategy</p>
                                            <p>This strategy relies on the spread between your after-tax cost of borrowing ({results.afterTaxBorrowingCost.toFixed(2)}%) and your target ETF return ({investmentReturn}%). A positive spread compounds wealth over time.</p>
                                        </div>
                                        <div>
                                            <p className="text-white mb-1 text-xs">Market Volatility Warning</p>
                                            <p>The Smith Manoeuvre is a leveraged investment strategy. Ensure your risk tolerance supports potential market declines, as the loan balance remains constant regardless of ETF performance.</p>
                                        </div>
                                    </div>
                                </footer>

                            </main>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
